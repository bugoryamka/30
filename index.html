<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>30 дней Unity — План обучения</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#f0eeeb;
  --sidebar-bg:#fafaf8;
  --card-bg:#ffffff;
  --text:#1a1a1a;
  --muted:#999;
  --light:#ccc;
  --accent:#1a1a1a;
  --border:#e8e6e3;
  --sw:360px;
  --pw:5px;
}
html{scroll-behavior:smooth;font-size:15px}
body{font-family:'Inter',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);display:flex;min-height:100vh;overflow-x:hidden}

/* ===== SIDEBAR ===== */
.sidebar{position:fixed;left:0;top:0;width:var(--sw);height:100vh;background:var(--sidebar-bg);display:flex;flex-direction:column;z-index:100;border-right:1px solid var(--border)}

.sb-head{padding:28px 28px 16px;display:flex;align-items:center;justify-content:space-between}
.logo{font-size:17px;font-weight:800;letter-spacing:-.5px;display:flex;align-items:center;gap:10px}
.logo-icon{width:38px;height:38px;border-radius:50%;background:#e8e6e3;display:flex;align-items:center;justify-content:center;font-size:18px;cursor:pointer;transition:transform .3s ease}
.logo-icon:hover{transform:rotate(180deg)}

/* circular progress */
.cprog{position:relative;width:42px;height:42px;flex-shrink:0}
.cprog svg{transform:rotate(-90deg);width:42px;height:42px}
.cprog-track{fill:none;stroke:#e8e6e3;stroke-width:3}
.cprog-fill{fill:none;stroke:var(--accent);stroke-width:3;stroke-linecap:round;transition:stroke-dashoffset .6s cubic-bezier(.4,0,.2,1)}
.cprog-text{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700}

/* nav list */
.sb-nav{flex:1;overflow-y:auto;padding:8px 0;scrollbar-width:none}
.sb-nav::-webkit-scrollbar{display:none}

.nav-week{padding:18px 28px 6px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:2px;color:var(--muted)}

.nav-item{display:flex;align-items:center;padding:5px 28px;cursor:pointer;text-decoration:none;color:var(--text);transition:all .45s cubic-bezier(.25,.1,.25,1);transform-origin:left center;position:relative;user-select:none}
.nav-item:hover{background:rgba(0,0,0,.03)}

.nav-bullet{width:8px;height:8px;border-radius:50%;background:transparent;margin-right:12px;flex-shrink:0;transition:all .45s ease;border:1.5px solid transparent}
.nav-item.active .nav-bullet{background:var(--accent);border-color:var(--accent)}
.nav-item:not(.active) .nav-bullet{border-color:#d0d0d0}

.nav-label{font-size:14px;font-weight:400;transition:all .45s ease;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.nav-day{margin-left:auto;font-size:13px;font-weight:400;transition:all .45s ease;flex-shrink:0;padding-left:10px;font-variant-numeric:tabular-nums}

.nav-item.active{opacity:1}
.nav-item.active .nav-label{font-weight:700;font-size:15.5px}
.nav-item.active .nav-day{font-weight:700;font-size:14.5px}

.nav-item.n1{opacity:.5}
.nav-item.n1 .nav-label{font-size:13.5px}
.nav-item.n2{opacity:.32}
.nav-item.n2 .nav-label{font-size:12.5px}
.nav-item.far{opacity:.18}
.nav-item.far .nav-label{font-size:11.5px}

.nav-item.done .nav-bullet{background:#4a4!important;border-color:#4a4!important}

/* tags */
.sb-tags{padding:14px 22px 22px;border-top:1px solid var(--border);display:flex;flex-wrap:wrap;gap:5px}
.tag{padding:5px 13px;border-radius:18px;background:var(--bg);font-size:11px;font-weight:500;color:var(--text);text-decoration:none;transition:all .2s ease;white-space:nowrap}
.tag:hover{background:var(--accent);color:#fff}

/* ===== PROGRESS BAR ===== */
.pbar{position:fixed;left:var(--sw);top:0;width:var(--pw);height:100vh;background:#e8e6e3;z-index:99}
.pbar-fill{width:100%;background:linear-gradient(180deg,#1a1a1a 0%,#444 100%);transition:height .6s cubic-bezier(.25,.1,.25,1);border-radius:0 0 3px 3px}

/* ===== MAIN CONTENT ===== */
.content{margin-left:calc(var(--sw) + var(--pw));padding:44px 56px 120px;max-width:880px;width:100%}

.hero{margin-bottom:56px}
.hero h1{font-size:38px;font-weight:900;letter-spacing:-1.5px;line-height:1.08;margin-bottom:12px}
.hero p{font-size:15px;color:var(--muted);line-height:1.65;max-width:560px}
.hero-stats{display:flex;gap:28px;margin-top:24px}
.hero-stat{text-align:center}
.hero-stat-num{font-size:28px;font-weight:800;letter-spacing:-1px}
.hero-stat-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-top:2px}

/* week */
.week-hdr{margin:56px 0 28px;padding-bottom:10px;border-bottom:2px solid var(--accent)}
.week-hdr:first-of-type{margin-top:0}
.week-hdr h2{font-size:21px;font-weight:800;letter-spacing:-.4px}
.week-sub{font-size:12px;color:var(--muted);margin-top:3px;font-style:italic}

/* day card */
.day{margin-bottom:36px;background:var(--card-bg);border-radius:16px;padding:28px 30px;box-shadow:0 1px 3px rgba(0,0,0,.04);transition:all .3s ease;border:1.5px solid transparent;scroll-margin-top:30px}
.day:hover{box-shadow:0 6px 24px rgba(0,0,0,.07)}
.day.all-done{border-color:#b5e2b5}

.day-top{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:6px}
.day-title{font-size:18px;font-weight:700;letter-spacing:-.3px}
.day-title em{font-style:normal;color:var(--muted);font-weight:400}
.day-counter{font-size:12px;color:var(--muted);font-variant-numeric:tabular-nums}

.day-ref{font-size:11px;color:var(--muted);margin-bottom:18px;padding:6px 12px;background:var(--bg);border-radius:7px;display:inline-block}

/* day mini progress */
.day-prog{height:3px;background:#eee;border-radius:2px;margin-bottom:18px;overflow:hidden}
.day-prog-fill{height:100%;background:var(--accent);border-radius:2px;transition:width .4s ease}

/* tasks */
.tasks{list-style:none}
.task{display:flex;align-items:flex-start;padding:8px 0;border-bottom:1px solid #f5f5f5;transition:all .2s ease}
.task:last-child{border-bottom:none}
.task:hover{background:#fafafa;margin:0 -10px;padding-left:10px;padding-right:10px;border-radius:8px}

.cb{position:relative;width:20px;height:20px;min-width:20px;border:2px solid #d0d0d0;border-radius:5px;margin-right:12px;margin-top:2px;cursor:pointer;transition:all .25s cubic-bezier(.4,0,.2,1);display:flex;align-items:center;justify-content:center;background:#fff}
.cb:hover{border-color:var(--accent);transform:scale(1.15)}
.cb.checked{background:var(--accent);border-color:var(--accent);transform:scale(1)}
.cb.checked::after{content:'✕';color:#fff;font-size:12px;font-weight:800;line-height:1}
.cb:active{transform:scale(.9)}

.task-txt{font-size:13.5px;line-height:1.6;transition:all .25s ease;flex:1}
.task.done .task-txt{text-decoration:line-through;color:var(--light)}

/* practice block */
.pract{margin-top:14px;padding:13px 16px;background:#fdfbf3;border-radius:10px;border-left:3px solid #ddd06a;display:flex;align-items:flex-start}
.pract .cb{margin-top:0}
.pract-inner{flex:1}
.pract-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1.2px;color:#b5a840;margin-bottom:3px}
.pract-txt{font-size:13px;line-height:1.5}
.pract.done .pract-txt{text-decoration:line-through;color:var(--light)}

/* result block */
.result{margin-top:14px;padding:13px 16px;background:#f2faf2;border-radius:10px;border-left:3px solid #6cc06c;display:flex;align-items:flex-start}
.result .cb{margin-top:0}
.result-inner{flex:1}
.result-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1.2px;color:#50a050;margin-bottom:3px}
.result-txt{font-size:13px;line-height:1.5}
.result.done .result-txt{text-decoration:line-through;color:var(--light)}

/* code block */
pre.code{background:#1a1a1a;color:#d4d4d4;padding:14px 18px;border-radius:10px;font-family:'SF Mono','Fira Code',monospace;font-size:12px;line-height:1.6;margin:10px 0;overflow-x:auto;white-space:pre}

/* final table */
.ftable{width:100%;border-collapse:collapse;margin:14px 0;font-size:13px}
.ftable th,.ftable td{padding:9px 12px;text-align:left;border-bottom:1px solid var(--border)}
.ftable th{font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted)}

/* toast */
.toast{position:fixed;bottom:30px;right:30px;background:var(--accent);color:#fff;padding:14px 24px;border-radius:12px;font-size:14px;font-weight:600;transform:translateY(100px);opacity:0;transition:all .4s cubic-bezier(.4,0,.2,1);z-index:200;pointer-events:none}
.toast.show{transform:translateY(0);opacity:1}

/* reset button */
.reset-btn{position:fixed;bottom:24px;right:24px;width:44px;height:44px;border-radius:50%;background:var(--card-bg);border:1px solid var(--border);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:18px;z-index:150;transition:all .2s ease;box-shadow:0 2px 8px rgba(0,0,0,.1)}
.reset-btn:hover{background:var(--accent);color:#fff;transform:scale(1.1)}

@media(max-width:1100px){
  :root{--sw:300px}
  .content{padding:30px 36px 80px}
}
@media(max-width:768px){
  .sidebar,.pbar{display:none}
  .content{margin-left:0;padding:20px 18px 60px}
  .hero h1{font-size:28px}
}
</style>
</head>

// ======== STATE ========
let state = JSON.parse(localStorage.getItem('unity30') || '{}');
let totalTasks = 0;
let taskElements = {};

// ======== BUILD ========
function build() {
  const nav = document.getElementById('sbnav');
  const main = document.getElementById('content');

  // Hero
  main.innerHTML = `
    <div class="hero">
      <h1>30 дней<br>Unity</h1>
      <p>План обучения по структуре официального мануала Unity 6000.3. Отмечай задачи по мере выполнения — прогресс сохраняется автоматически.</p>
      <div class="hero-stats">
        <div class="hero-stat"><div class="hero-stat-num" id="statDone">0</div><div class="hero-stat-label">Выполнено</div></div>
        <div class="hero-stat"><div class="hero-stat-num" id="statTotal">0</div><div class="hero-stat-label">Всего задач</div></div>
        <div class="hero-stat"><div class="hero-stat-num" id="statPct">0%</div><div class="hero-stat-label">Прогресс</div></div>
      </div>
    </div>`;

  DATA.forEach(week => {
    // Week header in nav
    nav.innerHTML += `<div class="nav-week">Неделя ${week.week}</div>`;

    // Week header in content
    main.innerHTML += `
      <div class="week-hdr" id="week${week.week}">
        <h2>Неделя ${week.week}: ${week.title}</h2>
        <div class="week-sub">${week.ref}</div>
      </div>`;

    week.days.forEach(d => {
      // Count tasks
      const taskCount = d.tasks.length + (d.practice ? 1 : 0) + (d.result ? 1 : 0);
      const taskIds = [];
      for (let i = 0; i < d.tasks.length; i++) taskIds.push(`d${d.day}_${i}`);
      if (d.practice) taskIds.push(`d${d.day}_p`);
      if (d.result) taskIds.push(`d${d.day}_r`);
      totalTasks += taskIds.length;

      // Nav item
      nav.innerHTML += `<a class="nav-item" data-day="${d.day}" href="#day${d.day}">
        <span class="nav-bullet"></span>
        <span class="nav-label">${d.title}</span>
        <span class="nav-day">День ${d.day}</span>
      </a>`;

      // Day card
      let tasksHtml = '';
      d.tasks.forEach((t, i) => {
        const id = `d${d.day}_${i}`;
        const checked = state[id] ? 'checked' : '';
        const done = state[id] ? 'done' : '';
        tasksHtml += `<li class="task ${done}" data-id="${id}">
          <div class="cb ${checked}" onclick="toggle('${id}',this)"></div>
          <div class="task-txt">${escHtml(t)}</div>
        </li>`;
      });

      let practHtml = '';
      if (d.practice) {
        const pid = `d${d.day}_p`;
        const pc = state[pid] ? 'checked' : '';
        const pd = state[pid] ? 'done' : '';
        practHtml = `<div class="pract ${pd}" data-id="${pid}">
          <div class="cb ${pc}" onclick="toggle('${pid}',this)"></div>
          <div class="pract-inner">
            <div class="pract-label">Практика</div>
            <div class="pract-txt">${escHtml(d.practice)}</div>
          </div>
        </div>`;
      }

      let resHtml = '';
      if (d.result) {
        const rid = `d${d.day}_r`;
        const rc = state[rid] ? 'checked' : '';
        const rd = state[rid] ? 'done' : '';
        resHtml = `<div class="result ${rd}" data-id="${rid}">
          <div class="cb ${rc}" onclick="toggle('${rid}',this)"></div>
          <div class="result-inner">
            <div class="result-label">Результат</div>
            <div class="result-txt">${escHtml(d.result)}</div>
          </div>
        </div>`;
      }

      // Calculate day progress
      const dayDone = taskIds.filter(id => state[id]).length;
      const dayPct = Math.round(dayDone / taskIds.length * 100);
      const allDone = dayDone === taskIds.length ? 'all-done' : '';

      main.innerHTML += `
        <section class="day ${allDone}" id="day${d.day}" data-day="${d.day}" data-tasks='${JSON.stringify(taskIds)}'>
          <div class="day-top">
            <div class="day-title">День ${d.day} <em>— ${d.title}</em></div>
            <div class="day-counter">${dayDone}/${taskIds.length}</div>
          </div>
          <div class="day-ref">📖 ${d.ref}</div>
          <div class="day-prog"><div class="day-prog-fill" style="width:${dayPct}%"></div></div>
          <ul class="tasks">${tasksHtml}</ul>
          ${practHtml}
          ${resHtml}
        </section>`;
    });
  });

  updateGlobal();
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ======== TOGGLE ========
function toggle(id, el) {
  state[id] = !state[id];
  localStorage.setItem('unity30', JSON.stringify(state));

  el.classList.toggle('checked', state[id]);
  const parent = el.closest('.task, .pract, .result');
  if (parent) parent.classList.toggle('done', state[id]);

  // Update day card
  const daySection = el.closest('.day');
  if (daySection) updateDay(daySection);

  updateGlobal();

  // Animation pulse
  el.style.transform = 'scale(1.3)';
  setTimeout(() => el.style.transform = '', 200);
}

function updateDay(section) {
  const ids = JSON.parse(section.dataset.tasks);
  const done = ids.filter(id => state[id]).length;
  const total = ids.length;
  const pct = Math.round(done / total * 100);

  section.querySelector('.day-counter').textContent = `${done}/${total}`;
  section.querySelector('.day-prog-fill').style.width = pct + '%';
  section.classList.toggle('all-done', done === total);

  // Update nav
  const day = section.dataset.day;
  const navItem = document.querySelector(`.nav-item[data-day="${day}"]`);
  if (navItem) navItem.classList.toggle('done', done === total);
}

function updateGlobal() {
  const done = Object.values(state).filter(Boolean).length;
  const pct = totalTasks > 0 ? Math.round(done / totalTasks * 100) : 0;

  document.getElementById('statDone').textContent = done;
  document.getElementById('statTotal').textContent = totalTasks;
  document.getElementById('statPct').textContent = pct + '%';

  // Progress bar
  document.getElementById('pbarFill').style.height = pct + '%';

  // Circular progress
  const circ = document.querySelector('.cprog-fill');
  const circumference = 2 * Math.PI * 18; // r=18
  circ.style.strokeDashoffset = circumference * (1 - pct / 100);
  document.querySelector('.cprog-text').textContent = pct + '%';

  // Milestones
  if (pct === 100) showToast('🎉 Все задачи выполнены! Поздравляю!');
  else if (done > 0 && pct % 25 === 0) showToast(`${pct}% пройдено! Так держать!`);
}

// ======== TOAST ========
let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 3000);
}

// ======== SIDEBAR SCROLL ANIMATION (OMSE.CO STYLE) ========
let activeDay = 1;

function setupObserver() {
  const sections = document.querySelectorAll('.day');
  const observer = new IntersectionObserver(entries => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        const d = parseInt(entry.target.dataset.day);
        if (d !== activeDay) {
          activeDay = d;
          updateNavHighlight(d);
        }
      }
    });
  }, { rootMargin: '-20% 0px -60% 0px' });

  sections.forEach(s => observer.observe(s));
}

function updateNavHighlight(active) {
  const items = document.querySelectorAll('.nav-item');
  items.forEach(item => {
    const d = parseInt(item.dataset.day);
    const dist = Math.abs(d - active);
    item.classList.remove('active', 'n1', 'n2', 'far');
    if (dist === 0) item.classList.add('active');
    else if (dist <= 2) item.classList.add('n1');
    else if (dist <= 5) item.classList.add('n2');
    else item.classList.add('far');
  });

  // Scroll nav to center active item
  const activeEl = document.querySelector('.nav-item.active');
  if (activeEl) {
    const navC = document.getElementById('sbnav');
    const top = activeEl.offsetTop - navC.offsetTop;
    const ch = navC.clientHeight;
    const ih = activeEl.clientHeight;
    navC.scrollTo({ top: top - ch / 2 + ih / 2, behavior: 'smooth' });
  }
}

// ======== NAV CLICK ========
document.addEventListener('click', e => {
  const navItem = e.target.closest('.nav-item');
  if (navItem) {
    e.preventDefault();
    const target = document.getElementById('day' + navItem.dataset.day);
    if (target) target.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }
});

// ======== RESET ========
document.getElementById('resetBtn').addEventListener('click', () => {
  if (confirm('Сбросить весь прогресс?')) {
    state = {};
    localStorage.removeItem('unity30');
    document.querySelectorAll('.cb').forEach(cb => cb.classList.remove('checked'));
    document.querySelectorAll('.task, .pract, .result').forEach(el => el.classList.remove('done'));
    document.querySelectorAll('.day').forEach(s => updateDay(s));
    updateGlobal();
    showToast('Прогресс сброшен');
  }
});

// ======== INIT ========
build();
setupObserver();
updateNavHighlight(1);

// Initial update for all day sections
document.querySelectorAll('.day').forEach(s => updateDay(s));
</script>
</body>
</html>
